# Target-specific link flags. See architecture doc §0.7 (cross-platform notes).
#
# Linux/macOS use gcc/clang-style flags; Windows MSVC uses /OPT:* equivalents.
# These dead-strip unused sections and fold identical code paths, cutting the
# release binary by an additional 15-25% on top of `strip = "symbols"`.

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-Wl,--gc-sections",
    "-C", "link-arg=-Wl,--icf=safe",
]

[target.aarch64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-Wl,--gc-sections",
    "-C", "link-arg=-Wl,--icf=safe",
]

[target.x86_64-pc-windows-msvc]
rustflags = [
    "-C", "link-arg=/OPT:REF",
    "-C", "link-arg=/OPT:ICF",
]

[target.aarch64-pc-windows-msvc]
rustflags = [
    "-C", "link-arg=/OPT:REF",
    "-C", "link-arg=/OPT:ICF",
]
